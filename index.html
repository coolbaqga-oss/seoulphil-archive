<style>
:root{
  --paper:#EDF0F3; --card:#FFF; --ink:#13202E; --ink2:#5B6E80; --ink3:#93A3B2;
  --rule:#D7DFE7; --pacs:#00A5C4; --pacs-d:#00768C; --amber:#D9880F; --red:#C0392B;
  --kr:"IBM Plex Sans KR",system-ui,sans-serif; --mo:"IBM Plex Mono",monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
body{background:var(--paper);color:var(--ink);font-family:var(--kr);-webkit-font-smoothing:antialiased}
.wrap{max-width:1160px;margin:0 auto;padding:env(safe-area-inset-top) 22px 170px}

.top{display:flex;justify-content:space-between;align-items:center;gap:14px;
  padding:20px 0 18px;border-bottom:1px solid var(--ink);flex-wrap:wrap}
.brand{font-weight:600;letter-spacing:-.03em;font-size:17px}
.brand span{font-family:var(--mo);font-size:9.5px;letter-spacing:.14em;color:var(--ink3);
  margin-left:10px;border:1px solid var(--rule);padding:2px 6px}
.tools{display:flex;gap:7px;flex-wrap:wrap}
.tbtn{font-family:var(--mo);font-size:11px;letter-spacing:.05em;padding:8px 12px;border:1px solid var(--rule);
  background:var(--card);color:var(--ink2);cursor:pointer;transition:.15s}
.tbtn:hover:not(:disabled){border-color:var(--ink);color:var(--ink)}
.tbtn:disabled{opacity:.4;cursor:default}
.tbtn.go{border-color:var(--pacs);color:var(--pacs-d)}
.tbtn.go:hover:not(:disabled){background:var(--pacs);color:#fff;border-color:var(--pacs)}
.tbtn.on{background:var(--amber);color:#fff;border-color:var(--amber)}

.nav{display:flex;align-items:center;gap:14px;padding:18px 0 4px;flex-wrap:wrap;min-height:36px}
.backbtn{display:inline-flex;align-items:center;gap:9px;font-family:var(--kr);font-size:14px;
  font-weight:500;letter-spacing:-.02em;padding:10px 18px 10px 14px;background:var(--ink);
  color:var(--paper);border:1px solid var(--ink);cursor:pointer;transition:.14s;flex-shrink:0}
.backbtn:hover{background:var(--pacs-d);border-color:var(--pacs-d);transform:translateX(-2px)}
.backbtn:active{transform:translateX(0)}
.backbtn:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
.backbtn .ar{font-size:16px;line-height:1;margin-top:-1px}
.crumb{font-family:var(--mo);font-size:11.5px;letter-spacing:.05em;color:var(--ink3);
  display:flex;gap:8px;align-items:center;flex-wrap:wrap;min-width:0}
.crumb button{background:none;border:none;font:inherit;color:var(--pacs-d);cursor:pointer;padding:5px 0}
.crumb button:hover{color:var(--ink);text-decoration:underline}
.crumb i{font-style:normal;color:var(--rule)}
.crumb b{color:var(--ink);font-weight:500}

.editbar{display:none;align-items:center;gap:10px;margin-top:12px;padding:11px 14px;
  background:#FDF4E3;border:1px solid var(--amber);flex-wrap:wrap}
.editbar.on{display:flex}
.editbar p{font-family:var(--mo);font-size:10.5px;letter-spacing:.04em;color:#8A5A08;flex:1;min-width:180px}
.editbar button{font-family:var(--mo);font-size:10.5px;letter-spacing:.04em;padding:6px 10px;
  border:1px solid var(--amber);background:#fff;color:#8A5A08;cursor:pointer}
.editbar button:hover{background:var(--amber);color:#fff}

.start{padding:66px 0 40px;text-align:center}
.start h1{font-size:clamp(21px,3.3vw,31px);font-weight:600;letter-spacing:-.035em;line-height:1.45}
.start p{margin-top:14px;color:var(--ink2);font-weight:300;font-size:14.5px;line-height:1.85}
.pick{margin-top:34px;display:inline-flex;flex-direction:column;align-items:center;gap:12px}
.bigbtn{font-family:var(--mo);font-size:13px;letter-spacing:.06em;padding:16px 30px;
  background:var(--ink);color:var(--paper);border:1px solid var(--ink);cursor:pointer;transition:.15s}
.bigbtn:hover{background:var(--pacs-d);border-color:var(--pacs-d)}
.hint{font-family:var(--mo);font-size:10.5px;color:var(--ink3);letter-spacing:.04em;line-height:1.95}

.prog{margin:34px auto 0;max-width:460px;text-align:left;display:none}
.prog.on{display:block}
.pbar{height:3px;background:var(--rule);overflow:hidden}
.pbar i{display:block;height:100%;background:var(--pacs);width:0;transition:width .18s}
.ptxt{font-family:var(--mo);font-size:10.5px;color:var(--ink3);letter-spacing:.04em;
  margin-top:9px;display:flex;justify-content:space-between;gap:12px}
.ptxt b{color:var(--ink2);font-weight:400;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ptxt span{flex-shrink:0}

.grp{padding:22px 0 4px}
.glab{font-family:var(--mo);font-size:10.5px;letter-spacing:.16em;color:var(--pacs-d);
  text-transform:uppercase;margin-bottom:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(174px,1fr));gap:9px}

.b{position:relative;background:var(--card);border:1px solid var(--rule);padding:15px 14px 13px;
  text-align:left;cursor:pointer;font-family:var(--kr);color:var(--ink);transition:.15s;
  min-height:82px;display:flex;flex-direction:column;justify-content:space-between}
.b:hover{border-color:var(--ink);transform:translateY(-2px);box-shadow:3px 4px 0 rgba(19,32,46,.09)}
.b:active{transform:translateY(0)}
.b:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
.b .bn{font-size:14.5px;font-weight:500;letter-spacing:-.025em;line-height:1.35;padding-right:24px}
.b .bc{font-family:var(--mo);font-size:10px;color:var(--ink3);letter-spacing:.06em;margin-top:12px}
.b .bc.has{color:var(--pacs-d)}
.b .sub{position:absolute;top:12px;right:12px;font-family:var(--mo);font-size:9px;letter-spacing:.1em;
  color:var(--pacs);border:1px solid var(--pacs);padding:1px 4px}
.b.virt{border-style:dashed}
.bwrap{display:flex;flex-direction:column}
.bwrap .b{flex:1}
.bwrap.dragging{opacity:.4}
.ebar{display:flex;border:1px solid var(--amber);border-top:none;background:#FDF4E3}
.ebar .hnd{flex:1.2;font-family:var(--mo);font-size:10px;letter-spacing:.03em;padding:8px 2px;
  border-right:1px solid #F0DDBA;color:#8A5A08;cursor:grab;text-align:center;
  touch-action:none;user-select:none;-webkit-user-select:none}
.ebar .hnd:active{cursor:grabbing;background:var(--amber);color:#fff}
.ebar button{flex:1;font-family:var(--mo);font-size:10px;letter-spacing:.03em;padding:8px 2px;
  border:none;border-right:1px solid #F0DDBA;background:none;color:#8A5A08;cursor:pointer;transition:.13s}
.ebar button:last-child{border-right:none}
.ebar button:hover:not(:disabled){background:var(--amber);color:#fff}
.ebar button:disabled{opacity:.25;cursor:default}
.ebar button.rm:hover:not(:disabled){background:var(--red);color:#fff}
.grid.editing .b:hover{transform:none;box-shadow:none}
.b.add{border-style:dashed;color:var(--ink3);align-items:center;justify-content:center;
  font-family:var(--mo);font-size:12px;letter-spacing:.08em;min-height:82px}
.b.add:hover{color:var(--pacs-d);border-color:var(--pacs);box-shadow:none;transform:none}

.dtop{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;
  padding-bottom:14px;border-bottom:1px solid var(--ink);flex-wrap:wrap;margin-top:14px}
.dtop h2{font-size:24px;font-weight:600;letter-spacing:-.035em}

.items{display:grid;grid-template-columns:repeat(auto-fill,minmax(198px,1fr));gap:11px;margin-top:18px}
.it{position:relative;background:var(--card);border:1px solid var(--rule);overflow:hidden}
.it .th{width:100%;height:154px;object-fit:cover;display:block;background:var(--paper);cursor:zoom-in}
.it .meta{padding:9px 11px 11px}
.it .t{font-size:12.5px;font-weight:500;letter-spacing:-.02em;word-break:break-all;line-height:1.45}
.it .s{font-family:var(--mo);font-size:9.5px;color:var(--ink3);letter-spacing:.05em;margin-top:5px}
.it a.t{color:var(--pacs-d);text-decoration:none}
.it a.t:hover{text-decoration:underline}
.it .badge{position:absolute;top:6px;left:6px;font-family:var(--mo);font-size:8.5px;letter-spacing:.1em;
  background:var(--ink);color:var(--paper);padding:2px 5px;z-index:1}
.it .x{position:absolute;top:5px;right:5px;width:24px;height:24px;border:1px solid var(--rule);
  background:var(--card);color:var(--ink2);cursor:pointer;font-size:12px;line-height:1;
  opacity:0;transition:.15s;z-index:2}
.it:hover .x{opacity:1}
.it .x:hover{background:var(--red);color:#fff;border-color:var(--red)}
.it .fico{height:154px;display:flex;align-items:center;justify-content:center;background:var(--paper);
  font-family:var(--mo);font-size:11px;letter-spacing:.1em;color:var(--ink3);
  border-bottom:1px solid var(--rule);cursor:pointer}
.empty{padding:44px 0;text-align:center;font-family:var(--mo);font-size:11.5px;color:var(--ink3);letter-spacing:.06em}

.mask{display:none;position:fixed;inset:0;background:rgba(19,32,46,.72);z-index:50;
  align-items:center;justify-content:center;padding:22px}
.mask.on{display:flex}
.modal{background:var(--card);border:1px solid var(--ink);padding:24px;width:100%;max-width:460px;
  box-shadow:7px 7px 0 rgba(19,32,46,.25);max-height:86vh;overflow:auto}
.modal h3{font-size:16px;font-weight:600;letter-spacing:-.025em;margin-bottom:16px}
.modal label{font-family:var(--mo);font-size:10px;letter-spacing:.12em;color:var(--ink3);
  display:block;margin:12px 0 5px}
.modal input{width:100%;padding:10px 11px;border:1px solid var(--rule);background:var(--paper);
  font-family:var(--kr);font-size:14px;color:var(--ink)}
.modal input:focus{outline:none;border-color:var(--pacs)}
.guide{font-size:13px;line-height:1.75;color:var(--ink2);font-weight:300}
.guide code{font-family:var(--mo);font-size:11.5px;background:var(--paper);border:1px solid var(--rule);
  padding:1px 5px;color:var(--ink)}
.guide ol{margin:0 0 0 17px}
.guide li{margin-bottom:10px}
.guide b{color:var(--ink);font-weight:500}
.guide a{color:var(--pacs-d)}
.hidlist{border-top:1px solid var(--rule)}
.hidrow{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 0;
  border-bottom:1px solid var(--rule)}
.hidrow span{font-size:13px;word-break:break-all;line-height:1.45}
.hidrow em{font-family:var(--mo);font-size:9.5px;color:var(--ink3);font-style:normal;display:block;margin-top:3px}
.hidrow button{font-family:var(--mo);font-size:10.5px;padding:6px 10px;border:1px solid var(--pacs);
  background:#fff;color:var(--pacs-d);cursor:pointer;flex-shrink:0}
.hidrow button:hover{background:var(--pacs);color:#fff}
.mrow{display:flex;gap:7px;margin-top:20px;justify-content:flex-end}
.mbtn{font-family:var(--mo);font-size:11px;letter-spacing:.06em;padding:9px 14px;border:1px solid var(--ink);
  background:var(--card);cursor:pointer;color:var(--ink)}
.mbtn.pri{background:var(--ink);color:var(--paper)}
.mbtn:hover{opacity:.82}

.lb{display:none;position:fixed;inset:0;background:rgba(19,32,46,.95);z-index:60;flex-direction:column;
  align-items:center;justify-content:center;padding:22px;gap:14px}
.lb.on{display:flex}
.lb .stage{flex:1;display:flex;align-items:center;justify-content:center;width:100%;min-height:0}
.lb img,.lb canvas{max-width:100%;max-height:100%;object-fit:contain;background:#fff}
.lbbar{display:flex;gap:8px;align-items:center;font-family:var(--mo);font-size:11px;letter-spacing:.08em;
  color:#B7C6D3;flex-wrap:wrap;justify-content:center}
.lbbar button{font:inherit;background:none;border:1px solid #3B4E61;color:#B7C6D3;padding:8px 14px;cursor:pointer}
.lbbar button:hover:not(:disabled){border-color:var(--pacs);color:var(--pacs)}
.lbbar button:disabled{opacity:.3;cursor:default}
.lbclose{position:absolute;top:16px;right:20px;background:none;border:none;color:#B7C6D3;font-size:28px;
  cursor:pointer;line-height:1;padding:6px 10px}
.lbclose:hover{color:#fff}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);
  color:var(--paper);font-family:var(--mo);font-size:11px;letter-spacing:.05em;padding:10px 18px;z-index:70;
  transition:.25s;opacity:0;max-width:88vw;text-align:center}
.toast.on{transform:translateX(-50%) translateY(0);opacity:1}

@media(max-width:600px){
  .grid{grid-template-columns:repeat(2,1fr)}
  .items{grid-template-columns:repeat(2,1fr)}
  .it .th,.it .fico{height:112px}
  .it .x{opacity:1}
}

/* 꽃밭 & 시츄 */
.meadow{position:fixed;left:0;right:0;bottom:0;height:112px;pointer-events:none;z-index:5;overflow:hidden}
.meadow .ground{position:absolute;left:0;right:0;bottom:0;height:26px;
  background:linear-gradient(180deg,#CBE3C0,#B7D8AB)}
.meadow .flower{position:absolute;bottom:16px;width:30px;height:46px}
.meadow .f1{left:27vw}.meadow .f2{left:61vw}
.meadow .f3{left:12vw;transform:scale(.72);opacity:.9}
.meadow .f4{left:45vw;transform:scale(.62);opacity:.85}
.meadow .f5{left:82vw;transform:scale(.78);opacity:.9}
.grassblade{position:absolute;bottom:20px;width:3px;height:13px;background:#9CC48B;border-radius:2px 2px 0 0}

.pup{position:absolute;bottom:18px;left:0;width:118px;height:92px;
  animation:stroll 34s linear infinite}
@keyframes stroll{
  0%   {transform:translateX(-140px)}
  26%  {transform:translateX(calc(27vw - 84px))}
  40%  {transform:translateX(calc(27vw - 84px))}
  62%  {transform:translateX(calc(61vw - 84px))}
  76%  {transform:translateX(calc(61vw - 84px))}
  100% {transform:translateX(calc(100vw + 40px))}
}
.pup .bob{animation:bob .46s ease-in-out infinite;transform-origin:60px 72px}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-1.6px)}}
.pup .headg{animation:sniff 34s linear infinite;transform-origin:84px 52px}
@keyframes sniff{
  0%,26%{transform:rotate(0deg)}
  28%{transform:rotate(26deg) translateY(3px)}
  30%{transform:rotate(22deg) translateY(2px)}
  32%{transform:rotate(27deg) translateY(3px)}
  34%{transform:rotate(22deg) translateY(2px)}
  36%{transform:rotate(27deg) translateY(3px)}
  40%,62%{transform:rotate(0deg)}
  64%{transform:rotate(26deg) translateY(3px)}
  66%{transform:rotate(22deg) translateY(2px)}
  68%{transform:rotate(27deg) translateY(3px)}
  70%{transform:rotate(22deg) translateY(2px)}
  72%{transform:rotate(27deg) translateY(3px)}
  76%,100%{transform:rotate(0deg)}
}
.pup .tailg{animation:wag .38s ease-in-out infinite;transform-origin:22px 48px}
@keyframes wag{0%,100%{transform:rotate(-7deg)}50%{transform:rotate(9deg)}}
.pup .leg{transform-origin:top center;animation:trot .46s ease-in-out infinite}
.pup .l2{animation-delay:.23s}
@keyframes trot{0%,100%{transform:rotate(13deg)}50%{transform:rotate(-13deg)}}
.pup .scent{opacity:0;animation:puff 34s linear infinite}
@keyframes puff{
  0%,27%{opacity:0}
  30%{opacity:.9;transform:translateY(0)}
  38%{opacity:0;transform:translateY(-11px)}
  63%{opacity:0}
  66%{opacity:.9;transform:translateY(0)}
  74%{opacity:0;transform:translateY(-11px)}
  100%{opacity:0}
}
@media(prefers-reduced-motion:reduce){.meadow{display:none}}
</style>

    <path d="M15 20 C10 30 11 40 15 46 C19 40 20 30 15 20" fill="#A8C79A"/>
    <path d="M15 26 q-9 -2 -12 -7 q7 -1 12 4" fill="#9CC48B"/>
    <g fill="#FBD9C6">
      <path d="M15 20 C9 16 8 6 15 2 C22 6 21 16 15 20"/>
      <path d="M15 20 C21 16 31 17 30 24 C24 27 17 25 15 20"/>

<script>
let RM=false, TREE=null, path=[], BUSY=false, EM=false, ADD=false;
const MEM=new Map();
const ZIPMEM=new Map(); let ZIPPED=false;

const ls=(k,d)=>{ try{ return JSON.parse(localStorage.getItem(k)) ?? d }catch{ return d } };
let LINKS=ls("pr:links",{});
let EDITS=ls("pr:edits",{rename:{},hidden:[],hiddenItems:[],extra:{},order:{}});
EDITS.rename||={}; EDITS.hidden||=[]; EDITS.hiddenItems||=[]; EDITS.extra||={}; EDITS.order||={};
const saveLinks=()=>{try{localStorage.setItem("pr:links",JSON.stringify(LINKS))}catch{}};
const saveEdits=()=>{try{localStorage.setItem("pr:edits",JSON.stringify(EDITS))}catch{}};

const uid=()=>Math.random().toString(36).slice(2,9);
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const IMG=/\.(jpe?g|png|gif|webp|bmp)$/i, PDFX=/\.pdf$/i;
const SKIP=/^(\.|~\$)|^(Thumbs\.db|desktop\.ini)$/i;
const kb=n=>n<1048576? Math.round(n/1024)+" KB" : (n/1048576).toFixed(1)+" MB";
const toast=m=>{const t=document.getElementById("toast");t.textContent=m;t.classList.add("on");
  clearTimeout(t._);t._=setTimeout(()=>t.classList.remove("on"),2600)};

const mk=(n,p)=>({id:uid(),n,p,kids:[],items:[]});
const pkey=n=>n.p.join("/");
const ikey=(dir,it)=>pkey(dir)+"|"+it.t;
const dn=n=>EDITS.rename[pkey(n)] ?? n.n;
const isHid=n=>EDITS.hidden.includes(pkey(n));
const isHidIt=(dir,it)=>EDITS.hiddenItems.includes(ikey(dir,it));

function extraOf(n){
  return (EDITS.extra[pkey(n)]||[]).map(e=>({id:e.id,n:e.n,p:[...n.p,e.n],kids:[],items:[],virt:true}));
}
const kidsOf=n=>{
  let ks=[...n.kids,...extraOf(n)].filter(k=>EM||!isHid(k));
  const ord=EDITS.order[pkey(n)];
  if(ord) ks.sort((a,b)=>{
    const ia=ord.indexOf(a.n), ib=ord.indexOf(b.n);
    return (ia<0?999:ia)-(ib<0?999:ib) || a.n.localeCompare(b.n,"ko",{numeric:true});
  });
  return ks;
};
function bindDrag(cur,kids){
  const g=document.getElementById("fgrid"); if(!g)return;
  const commit=()=>{
    const names=[...g.querySelectorAll(".bwrap[data-w]")]
      .map(w=>kids.find(x=>x.id===w.dataset.w)?.n).filter(Boolean);
    EDITS.order[pkey(cur)]=names; saveEdits(); route();
  };
  let dragEl=null;
  g.querySelectorAll(".bwrap[data-w]").forEach(w=>{
    w.addEventListener("dragstart",e=>{ dragEl=w; w.classList.add("dragging");
      e.dataTransfer.effectAllowed="move"; e.dataTransfer.setData("text/plain","") });
    w.addEventListener("dragend",()=>{ if(!dragEl)return;
      dragEl.classList.remove("dragging"); dragEl=null; commit() });
  });
  g.addEventListener("dragover",e=>{
    if(!dragEl)return; e.preventDefault();
    const t=e.target.closest(".bwrap[data-w]");
    if(!t||t===dragEl)return;
    const r=t.getBoundingClientRect();
    const after=(e.clientY>r.bottom) || (e.clientY>=r.top&&(e.clientX-r.left)/r.width>.5);
    g.insertBefore(dragEl, after?t.nextSibling:t);
  });
  g.addEventListener("drop",e=>e.preventDefault());

  let tEl=null, ghost=null, ox=0, oy=0;
  g.querySelectorAll(".hnd").forEach(h=>h.addEventListener("touchstart",e=>{
    tEl=h.closest(".bwrap"); const t=e.touches[0], r=tEl.getBoundingClientRect();
    ox=t.clientX-r.left; oy=t.clientY-r.top;
    ghost=tEl.cloneNode(true);
    Object.assign(ghost.style,{position:"fixed",left:r.left+"px",top:r.top+"px",
      width:r.width+"px",pointerEvents:"none",opacity:".85",zIndex:80,
      boxShadow:"0 10px 26px rgba(19,32,46,.25)"});
    document.body.appendChild(ghost);
    tEl.classList.add("dragging");
  },{passive:true}));
  g.addEventListener("touchmove",e=>{
    if(!tEl)return;
    const t=e.touches[0];
    ghost.style.left=(t.clientX-ox)+"px"; ghost.style.top=(t.clientY-oy)+"px";
    const el=document.elementFromPoint(t.clientX,t.clientY)?.closest(".bwrap[data-w]");
    if(el&&el!==tEl){
      const r=el.getBoundingClientRect();
      g.insertBefore(tEl,(t.clientX-r.left)/r.width>.5?el.nextSibling:el);
    }
    e.preventDefault();
  },{passive:false});
  const endT=()=>{ if(!tEl)return; ghost?.remove(); ghost=null;
    tEl.classList.remove("dragging"); tEl=null; commit() };
  g.addEventListener("touchend",endT); g.addEventListener("touchcancel",endT);
}
const itemsOf=n=>n.items.filter(it=>EM||!isHidIt(n,it));

function walk(root,segs){
  let cur=root;
  for(const s of segs){
    let k=cur.kids.find(x=>x.n===s);
    if(!k){ k=mk(s,[...cur.p,s]); cur.kids.push(k) }
    cur=k;
  }
  return cur;
}
function at(p){ let c=TREE; for(const id of p){ const k=kidsOf(c).find(x=>x.id===id); if(!k)return c; c=k } return c }
const deepCount=n=>itemsOf(n).length+(LINKS[pkey(n)]||[]).length
  +kidsOf(n).reduce((a,k)=>a+deepCount(k),0);
function sortNode(n){
  n.kids.sort((a,b)=>a.n.localeCompare(b.n,"ko",{numeric:true}));
  n.items.sort((a,b)=>a.t.localeCompare(b.t,"ko",{numeric:true}));
  n.kids.forEach(sortNode);
}

const bu=b=>URL.createObjectURL(b);
const loadImg=f=>new Promise((ok,no)=>{const u=bu(f),im=new Image();
  im.onload=()=>{URL.revokeObjectURL(u);ok(im)}; im.onerror=()=>{URL.revokeObjectURL(u);no(0)}; im.src=u});
const toBlob=(cv,q)=>new Promise(r=>cv.toBlob(r,"image/jpeg",q));
function fit(im,max,q){
  const sc=Math.min(1,max/Math.max(im.width,im.height));
  const cv=document.createElement("canvas");
  cv.width=Math.max(1,Math.round(im.width*sc)); cv.height=Math.max(1,Math.round(im.height*sc));
  const g=cv.getContext("2d"); g.fillStyle="#fff"; g.fillRect(0,0,cv.width,cv.height);
  g.drawImage(im,0,0,cv.width,cv.height); return toBlob(cv,q);
}
let pdfjs=null;
async function loadPdfjs(){
  if(pdfjs)return pdfjs;
  await new Promise((ok,no)=>{const s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    s.onload=ok;s.onerror=no;document.head.appendChild(s)});
  pdfjs=window.pdfjsLib;
  pdfjs.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  return pdfjs;
}
async function openPdf(src){
  const lib=await loadPdfjs();
  if(typeof src==="string") return lib.getDocument(src).promise;
  return lib.getDocument({data:new Uint8Array(await src.arrayBuffer())}).promise;
}
async function paint(doc,n,maxW){
  const pg=await doc.getPage(n), v0=pg.getViewport({scale:1});
  const vp=pg.getViewport({scale:Math.min(2.4,maxW/v0.width)});
  const cv=document.createElement("canvas"); cv.width=vp.width; cv.height=vp.height;
  await pg.render({canvasContext:cv.getContext("2d"),viewport:vp}).promise;
  return cv;
}

document.getElementById("dpick").onchange=e=>{ const f=[...e.target.files]; e.target.value=""; ingest(f) };
async function ingest(files){
  if(!files.length||BUSY)return;
  BUSY=true;
  const good=files.filter(f=>f.size>0 && !f.webkitRelativePath.split("/").some(s=>SKIP.test(s)));
  if(!good.length){ BUSY=false; ADD=false; toast("읽을 파일이 없습니다"); return }

  const merge = ADD && TREE;
  let root, base;
  if(merge){
    base = path.length? at(path) : TREE;
    root = TREE;
    showProg(true);
  }else{
    MEM.forEach(m=>{ m.tu&&URL.revokeObjectURL(m.tu); m.fu&&URL.revokeObjectURL(m.fu) });
    MEM.clear();
    root = mk("root",[]); base = root; TREE=null; path=[];
    topbar(); nav(); start(); showProg(true);
  }

  let done=0, skipped=0, dup=0;
  for(const f of good){
    const segs=f.webkitRelativePath.split("/");
    if(!merge) segs.shift();
    const name=segs.pop();
    const dir=walk(base,segs);
    const t0=name.replace(/\.(pdf|[^.]+)$/i,"");
    if(dir.items.some(x=>x.t===t0)){ dup++; done++; continue }
    const id=uid();
    try{
      if(IMG.test(name)){
        const im=await loadImg(f);
        const thumb=await fit(im,560,.70);
        const full=(f.size<420*1024 && /\.jpe?g$/i.test(name)) ? f : await fit(im,1800,.85);
        MEM.set(id,{thumb,full});
        dir.items.push({id,k:"img",fx:"jpg",t:name.replace(/\.[^.]+$/,""),s:`${im.width}\u00d7${im.height} \u00b7 ${kb(f.size)}`});
      }else if(PDFX.test(name)){
        const doc=await openPdf(f);
        MEM.set(id,{thumb:await toBlob(await paint(doc,1,560),.70),full:f});
        dir.items.push({id,k:"pdf",fx:"pdf",t:name.replace(/\.pdf$/i,""),pages:doc.numPages,s:`${doc.numPages}p \u00b7 ${kb(f.size)}`});
      }else if(f.size<25*1048576){
        MEM.set(id,{full:f});
        const ext=(name.split(".").pop()||"file").slice(0,5);
        dir.items.push({id,k:"file",fx:ext,ext,t:name,s:kb(f.size)});
      }else skipped++;
    }catch(err){ console.warn(name,err); skipped++ }
    done++;
    if(done%2===0||done===good.length){ prog(done,good.length,name); await new Promise(r=>setTimeout(r)) }
  }
  sortNode(root); TREE=root; BUSY=false;
  const wasAdd=ADD; ADD=false;
  showProg(false); topbar(); route();
  toast(`${wasAdd?"추가 ":""}${done-skipped-dup}개${dup?` \u00b7 중복 ${dup}개 제외`:""}${skipped?` \u00b7 ${skipped}개 건너뜀`:""}`);
}
const showProg=on=>document.querySelector(".prog")?.classList.toggle("on",on);
function prog(a,b,nm){
  const p=document.querySelector(".prog"); if(!p)return;
  p.querySelector(".pbar i").style.width=(a/b*100)+"%";
  p.querySelector(".ptxt b").textContent=nm;
  p.querySelector(".ptxt span").textContent=`${a} / ${b}`;
}

document.getElementById("zpick").onchange=e=>{const f=e.target.files[0];e.target.value="";if(f)openZip(f)};
async function openZip(file){
  if(BUSY)return; BUSY=true; toast("ZIP 여는 중\u2026");
  try{
    if(!window.JSZip) await new Promise((ok,no)=>{const s=document.createElement("script");
      s.src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js";
      s.onload=ok;s.onerror=no;document.head.appendChild(s)});
    const zip=await JSZip.loadAsync(file);
    let dj=null;
    zip.forEach((p,o)=>{if(!dj&&/(^|\/)data\.json$/i.test(p)&&!o.dir)dj=o});
    if(!dj){toast("data.json이 없는 ZIP입니다");BUSY=false;return}
    const base=dj.name.replace(/data\.json$/i,"");
    const d=JSON.parse(await dj.async("string"));
    ZIPMEM.forEach(u=>URL.revokeObjectURL(u)); ZIPMEM.clear();
    const jobs=[];
    zip.forEach((p,o)=>{
      if(o.dir)return;
      const m=p.replace(base,"");
      if(/^assets\//i.test(m)) jobs.push(o.async("blob").then(b=>ZIPMEM.set(m,URL.createObjectURL(b))));
    });
    await Promise.all(jobs);
    TREE=d.tree; LINKS=d.links||{}; RM=true; ZIPPED=true; path=[];
    EDITS={rename:{},hidden:[],hiddenItems:[],extra:{},order:{}};
    topbar(); route(); toast("아카이브 열림 \u00b7 읽기 전용");
  }catch(err){console.error(err);toast("ZIP 열기 실패")}
  BUSY=false;
}

function topbar(){
  document.getElementById("mode").textContent=(RM?"ARCHIVE":"STUDIO");
  const t=document.getElementById("tools");
  if(RM){ t.innerHTML=""; document.getElementById("editbar").classList.remove("on"); return }
  t.innerHTML=`<button class="tbtn" id="t-load">${TREE?"다시 불러오기":"USB 폴더"}</button>
    ${TREE?`<button class="tbtn" id="t-add">+ 폴더 추가</button>`:""}
    <button class="tbtn ${EM?"on":""}" id="t-edit" ${TREE?"":"disabled"}>${EM?"편집 끝":"편집"}</button>
    <button class="tbtn go" id="t-pub" ${TREE?"":"disabled"}>사이트 만들기</button>
    <button class="tbtn" id="t-help">?</button>`;
  document.getElementById("t-load").onclick=()=>{
    if(TREE && !confirm("지금 불러온 자료를 전부 지우고 새로 읽습니다.\n기존 것을 유지하려면 [+ 폴더 추가]를 쓰세요.\n\n진행할까요?"))return;
    ADD=false; document.getElementById("dpick").click();
  };
  if(TREE) document.getElementById("t-add").onclick=()=>{
    const cur = path.length? at(path) : TREE;
    if(cur.virt){ toast("직접 만든 폴더에는 파일을 넣을 수 없습니다"); return }
    ADD=true; document.getElementById("dpick").click();
  };
  document.getElementById("t-edit").onclick=()=>{ EM=!EM; topbar(); route() };
  document.getElementById("t-pub").onclick=publish;
  document.getElementById("t-help").onclick=help;
  document.getElementById("editbar").classList.toggle("on",EM&&!!TREE);
}
document.getElementById("e-hid").onclick=hiddenPanel;
document.getElementById("e-reset").onclick=()=>{
  if(!confirm("이름 변경 · 숨김 · 순서 · 추가한 폴더를 전부 되돌립니다. 진행할까요?"))return;
  EDITS={rename:{},hidden:[],hiddenItems:[],extra:{},order:{}}; saveEdits(); path=[]; route(); toast("되돌렸습니다");
};

function nav(){
  const el=document.getElementById("nav");
  if(!TREE||!path.length){ el.innerHTML=""; return }
  const up=path.slice(0,-1);
  let c=`<button data-go="0">전체</button>`;
  path.forEach((id,i)=>{
    const n=at(path.slice(0,i+1));
    c+=`<i>/</i>`+(i===path.length-1?`<b>${esc(dn(n))}</b>`:`<button data-go="${i+1}">${esc(dn(n))}</button>`);
  });
  el.innerHTML=`<button class="backbtn" id="back"><span class="ar">\u2190</span>뒤로</button>
    <div class="crumb">${c}</div>`;
  document.getElementById("back").onclick=()=>{ path=up; route() };
  el.querySelectorAll("[data-go]").forEach(b=>b.onclick=()=>{ path=path.slice(0,+b.dataset.go); route() });
}
function route(){ nav(); TREE? render() : start(); window.scrollTo({top:0}) }

function start(){
  document.getElementById("view").innerHTML=`
    <div class="start">
      <h1>USB 폴더를 통째로 열어보세요.</h1>
      <p>폴더 구조를 그대로 읽어서 화면을 만듭니다.<br>
         이미지는 미리보기로, PDF는 넘겨볼 수 있게 바뀝니다.</p>
      <div class="pick">
        <button class="bigbtn" id="s-pick">USB 폴더 선택 (PC)</button>
        <button class="bigbtn" id="s-zip" style="background:var(--pacs-d);border-color:var(--pacs-d)">아이패드 \u00b7 USB의 ZIP 열기</button>
        <div class="hint">파일은 어디에도 업로드되지 않습니다 \u00b7 이 기기 안에서만 처리됩니다<br>
          폴더 선택은 Chrome/Edge (PC) \u00b7 아이패드/폰은 ZIP 열기</div>
      </div>
      <div class="prog"><div class="pbar"><i></i></div><div class="ptxt"><b></b><span></span></div></div>
    </div>`;
  document.getElementById("s-pick").onclick=()=>document.getElementById("dpick").click();
  document.getElementById("s-zip").onclick=()=>document.getElementById("zpick").click();
}

function render(){
  const cur = path.length? at(path) : TREE;
  const isRoot = !path.length;
  const kids = kidsOf(cur);
  document.getElementById("view").innerHTML=`
    ${isRoot?"":`<div class="dtop"><h2>${esc(dn(cur))}</h2>
      ${RM?"":`<div class="tools"><button class="tbtn" id="a-l">+ 링크</button></div>`}</div>`}
    ${(kids.length||EM)?`<div class="grp">${isRoot?"":`<div class="glab">하위 ${kids.length}</div>`}
      <div class="grid ${EM?"editing":""}" id="fgrid">${kids.map(k=>{
        const n=deepCount(k), hid=isHid(k);
        return `<div class="bwrap" data-w="${k.id}" ${EM?'draggable="true"':""}>
        <button class="b ${k.virt?"virt":""}" data-k="${k.id}" style="${hid?"opacity:.42":""}">
          ${!EM&&k.kids.length?`<span class="sub">${k.kids.length}</span>`:""}
          <div class="bn">${esc(dn(k))}</div>
          <div class="bc ${n?"has":""}">${hid?"숨김":(n?n+" 개":"비어 있음")}</div>
        </button>
        ${EM?`<div class="ebar">
          <span class="hnd" title="끌어서 순서 이동">\u283f 이동</span>
          <button data-rn="${k.id}">이름</button>
          <button class="rm" data-hd="${k.id}">${hid?"보이기":(k.virt?"삭제":"숨김")}</button>
        </div>`:""}</div>`}).join("")}
        ${EM?`<div class="bwrap"><button class="b add" id="a-folder">+ 폴더</button></div>`:""}
      </div></div>`:""}
    <div class="items" id="items"></div>`;

  if(!isRoot&&!RM) document.getElementById("a-l").onclick=()=>addLink(cur);
  const v=document.getElementById("view");
  v.querySelectorAll("[data-k]").forEach(b=>b.onclick=()=>{ path=[...path,b.dataset.k]; route() });
  if(EM) bindDrag(cur,kids);
  v.querySelectorAll("[data-rn]").forEach(b=>b.onclick=()=>{
    const k=kids.find(x=>x.id===b.dataset.rn);
    form("이름 변경",[{k:"n",l:"표시할 이름",v:dn(k)}],x=>{
      const nm=x.n.trim();
      if(!nm||nm===k.n) delete EDITS.rename[pkey(k)]; else EDITS.rename[pkey(k)]=nm;
      saveEdits(); route(); toast("이름 변경됨");
    });
  });
  v.querySelectorAll("[data-hd]").forEach(b=>b.onclick=()=>{
    const k=kids.find(x=>x.id===b.dataset.hd), key=pkey(k);
    if(k.virt && !isHid(k)){
      if(!confirm(`"${dn(k)}" 폴더를 삭제할까요? 직접 만든 폴더입니다.`))return;
      EDITS.extra[pkey(cur)]=(EDITS.extra[pkey(cur)]||[]).filter(x=>x.id!==k.id);
      delete LINKS[key]; saveLinks(); saveEdits(); route(); toast("삭제됨"); return;
    }
    EDITS.hidden.includes(key) ? EDITS.hidden=EDITS.hidden.filter(x=>x!==key) : EDITS.hidden.push(key);
    saveEdits(); route();
  });
  if(EM) document.getElementById("a-folder").onclick=()=>form("폴더 추가",[{k:"n",l:"폴더 이름"}],x=>{
    const nm=x.n.trim(); if(!nm)return;
    (EDITS.extra[pkey(cur)]||=[]).push({id:uid(),n:nm});
    saveEdits(); route(); toast("폴더 추가됨");
  });
  items(cur);
}

function items(cur){
  const el=document.getElementById("items");
  const links=(LINKS[pkey(cur)]||[]).map(l=>({...l,k:"link"}));
  const list=[...links,...itemsOf(cur)];
  if(!list.length){ el.innerHTML = kidsOf(cur).length? "" : `<div class="empty">파일 없음</div>`; return }
  el.innerHTML=list.map(it=>{
    const hid=it.k!=="link"&&isHidIt(cur,it);
    return `<div class="it" style="${hid?"opacity:.42":""}">
    ${!RM&&(EM||it.k==="link")?`<button class="x" data-x="${it.id}" data-lk="${it.k==="link"?1:0}">${hid?"\u21ba":"\u00d7"}</button>`:""}
    ${it.k==="pdf"?`<span class="badge">PDF \u00b7 ${it.pages}p</span>`:""}
    ${it.k==="link" ? `<div class="fico" style="color:var(--pacs-d)">LINK \u2197</div>`
      : it.k==="file" ? `<div class="fico" data-dl="${it.id}">${esc((it.ext||"FILE").toUpperCase())}</div>`
      : `<img class="th" data-v="${it.id}" src="${thumbURL(it.id)}" alt="" loading="lazy">`}
    <div class="meta">
      ${it.k==="link"?`<a class="t" href="${esc(it.u)}" target="_blank" rel="noopener">${esc(it.t)}</a>`
        :`<div class="t">${esc(it.t)}</div>`}
      <div class="s">${hid?"숨김":esc(it.s||"")}</div></div></div>`}).join("");
  el.querySelectorAll("[data-v]").forEach(i=>i.onclick=()=>view(i.dataset.v,list));
  el.querySelectorAll("[data-dl]").forEach(b=>b.onclick=()=>grab(b.dataset.dl,list));
  el.querySelectorAll("[data-x]").forEach(b=>b.onclick=()=>{
    const it=list.find(x=>x.id===b.dataset.x);
    if(b.dataset.lk==="1"){
      LINKS[pkey(cur)]=(LINKS[pkey(cur)]||[]).filter(x=>x.id!==it.id); saveLinks();
    }else{
      const key=ikey(cur,it);
      EDITS.hiddenItems.includes(key)
        ? EDITS.hiddenItems=EDITS.hiddenItems.filter(x=>x!==key)
        : EDITS.hiddenItems.push(key);
      saveEdits();
    }
    render();
  });
}

function thumbURL(id){
  if(ZIPPED) return ZIPMEM.get(`assets/t_${id}.jpg`)||"";
  if(RM) return `assets/t_${id}.jpg`;
  const m=MEM.get(id); if(!m?.thumb) return "";
  return m.tu ||= bu(m.thumb);
}
function fullURL(id,fx){
  if(ZIPPED) return ZIPMEM.get(`assets/f_${id}.${fx}`)||"";
  if(RM) return `assets/f_${id}.${fx}`;
  const m=MEM.get(id); if(!m?.full) return "";
  return m.fu ||= bu(m.full);
}
function grab(id,list){
  const it=list.find(x=>x.id===id);
  const a=document.createElement("a"); a.href=fullURL(id,it.fx); a.download=it.t;
  a.target="_blank"; a.rel="noopener"; a.click();
}

function hiddenPanel(){
  const rows=[
    ...EDITS.hidden.map(k=>({k,label:k.split("/").pop(),sub:k,type:"folder"})),
    ...EDITS.hiddenItems.map(k=>({k,label:k.split("|")[1],sub:k.split("|")[0],type:"item"}))
  ];
  document.getElementById("m-title").textContent=`숨긴 항목 ${rows.length}개`;
  document.getElementById("m-body").innerHTML = rows.length
    ? `<div class="hidlist">${rows.map(r=>`<div class="hidrow">
        <span>${esc(r.label)}<em>${r.type==="folder"?"폴더":"파일"} \u00b7 ${esc(r.sub)}</em></span>
        <button data-r="${esc(r.k)}" data-t="${r.type}">되돌리기</button></div>`).join("")}</div>`
    : `<div class="guide">숨긴 항목이 없습니다.</div>`;
  document.getElementById("m-row").innerHTML=`<button class="mbtn pri" id="m-no">닫기</button>`;
  document.getElementById("m-no").onclick=closeM;
  document.querySelectorAll("[data-r]").forEach(b=>b.onclick=()=>{
    const k=b.dataset.r;
    if(b.dataset.t==="folder") EDITS.hidden=EDITS.hidden.filter(x=>x!==k);
    else EDITS.hiddenItems=EDITS.hiddenItems.filter(x=>x!==k);
    saveEdits(); hiddenPanel(); route();
  });
  document.getElementById("mask").classList.add("on");
}

let vp={};
async function view(id,list){
  const it=list.find(x=>x.id===id);
  const lb=document.getElementById("lb"), st=document.getElementById("lb-stage"), bar=document.getElementById("lb-bar");
  lb.classList.add("on");
  st.innerHTML=`<div style="color:#8FA3B4;font-family:var(--mo);font-size:11px">불러오는 중\u2026</div>`; bar.innerHTML="";
  try{
    if(it.k==="img"){
      st.innerHTML=""; const im=new Image(); im.src=fullURL(id,"jpg"); st.appendChild(im);
      const sib=list.filter(x=>x.k==="img"), i=sib.findIndex(x=>x.id===id);
      vp={sib,i,list};
      bar.innerHTML=`<button id="pv" ${i<=0?"disabled":""}>\u2190 이전</button>
        <span>${esc(it.t)} \u00b7 ${i+1}/${sib.length}</span>
        <button id="nx" ${i>=sib.length-1?"disabled":""}>다음 \u2192</button>`;
      document.getElementById("pv").onclick=()=>view(sib[i-1].id,list);
      document.getElementById("nx").onclick=()=>view(sib[i+1].id,list);
      return;
    }
    if(it.k==="pdf"){
      const src = (RM||ZIPPED)? fullURL(id,"pdf") : MEM.get(id).full;
      const doc=await openPdf(src);
      vp={doc,n:1,total:doc.numPages}; await page(1);
    }
  }catch(e){ console.error(e);
    st.innerHTML=`<div style="color:#8FA3B4;font-family:var(--mo);font-size:11px">불러오기 실패</div>` }
}
async function page(n){
  const st=document.getElementById("lb-stage"), bar=document.getElementById("lb-bar");
  vp.n=Math.min(Math.max(1,n),vp.total);
  const cv=await paint(vp.doc,vp.n,1500);
  st.innerHTML=""; st.appendChild(cv);
  bar.innerHTML=`<button id="pv" ${vp.n<=1?"disabled":""}>\u2190 이전</button>
    <span>${vp.n} / ${vp.total}</span><button id="nx" ${vp.n>=vp.total?"disabled":""}>다음 \u2192</button>`;
  document.getElementById("pv").onclick=()=>page(vp.n-1);
  document.getElementById("nx").onclick=()=>page(vp.n+1);
}
const closeLb=()=>{document.getElementById("lb").classList.remove("on");vp={}};
document.getElementById("lb-x").onclick=closeLb;
document.getElementById("lb").onclick=e=>{if(e.target.id==="lb")closeLb()};

function addLink(cur){
  form("링크 추가",[{k:"t",l:"제목",p:"예: 무릎 재활 운동법"},{k:"u",l:"URL",p:"https://"}],v=>{
    if(!v.u.trim())return;
    (LINKS[pkey(cur)]||=[]).unshift({id:uid(),t:v.t.trim()||v.u.trim(),u:v.u.trim(),
      s:new Date().toLocaleDateString("ko-KR")});
    saveLinks(); render(); toast("등록 완료");
  });
}
function form(t,fs,cb){
  document.getElementById("m-title").textContent=t;
  document.getElementById("m-body").innerHTML=fs.map(f=>
    `<label>${f.l}</label><input data-k="${f.k}" value="${esc(f.v||"")}" placeholder="${esc(f.p||"")}">`).join("");
  document.getElementById("m-row").innerHTML=`<button class="mbtn" id="m-no">취소</button><button class="mbtn pri" id="m-ok">저장</button>`;
  document.getElementById("m-no").onclick=closeM;
  document.getElementById("m-ok").onclick=()=>{const v={};
    document.querySelectorAll("#m-body input").forEach(i=>v[i.dataset.k]=i.value); closeM(); cb(v)};
  document.getElementById("mask").classList.add("on");
  setTimeout(()=>{const i=document.querySelector("#m-body input");i?.focus();i?.select()},40);
}
const closeM=()=>document.getElementById("mask").classList.remove("on");

function help(){
  document.getElementById("m-title").textContent="아이패드에 올리는 법";
  document.getElementById("m-body").innerHTML=`<div class="guide"><ol>
    <li><b>USB 폴더</b>(PC)를 눌러 자료가 든 폴더를 통째로 고른다. 하위 폴더까지 알아서 읽는다.</li>
    <li>다른 폴더를 더 넣고 싶으면 넣을 위치를 연 다음 <b>+ 폴더 추가</b>.
        기존 것은 그대로 두고 합쳐진다. <code>다시 불러오기</code>는 전부 지우고 새로 읽으니 주의.</li>
    <li><b>편집</b>에서 폴더 이름을 다듬거나, 안 보여줄 것을 숨긴다. (원본 USB는 건드리지 않는다)</li>
    <li><b>사이트 만들기</b> \u2192 ZIP 파일이 받아진다.</li>
    <li><b>[가장 간단]</b> 그 ZIP을 USB-C에 넣어 아이패드/폰에 꽂고 → 이 화면에서
        <b>"아이패드 \u00b7 USB의 ZIP 열기"</b> → 파일앱에서 그 ZIP을 고르면 바로 읽기전용으로 뜬다.
        서버도, 인터넷도, 홈화면 등록도 필요 없다.</li>
    <li><b>[홈화면 앱으로 쓰기]</b> ZIP을 풀면 <code>index.html</code> \u00b7 <code>data.json</code> \u00b7 <code>assets/</code> 가 나온다.
        <a href="https://app.netlify.com/drop" target="_blank" rel="noopener">app.netlify.com/drop</a> 에
        풀어놓은 <b>폴더를 통째로 끌어다 놓으면</b> 주소가 생긴다. 아이패드 사파리로 열고 → <b>공유 \u2192 홈 화면에 추가</b>.</li>
  </ol>
  <p style="margin-top:16px;color:var(--ink3);font-size:12px;line-height:1.85">
  아이폰\u00b7아이패드 사파리는 "폴더 통째 선택"을 지원하지 않아 USB-C를 꽂아도 폴더 방식은 안 된다.
  그래서 아이패드에서는 <b>ZIP 열기</b>를 쓴다.<br>
  편집한 내용은 폴더 경로 기준으로 기억되므로 USB를 다시 불러와도 유지된다.</p></div>`;
  document.getElementById("m-row").innerHTML=`<button class="mbtn pri" id="m-no">닫기</button>`;
  document.getElementById("m-no").onclick=closeM;
  document.getElementById("mask").classList.add("on");
}

function bake(n){
  if(isHid(n)) return null;
  let raw=[...n.kids,...extraOf(n)];
  const ord=EDITS.order[pkey(n)];
  if(ord) raw.sort((a,b)=>{
    const ia=ord.indexOf(a.n), ib=ord.indexOf(b.n);
    return (ia<0?999:ia)-(ib<0?999:ib) || a.n.localeCompare(b.n,"ko",{numeric:true});
  });
  const kids=raw.map(bake).filter(Boolean);
  return {id:n.id,n:dn(n),p:n.p,items:n.items.filter(it=>!isHidIt(n,it)),kids};
}
function collectIds(n,set){ n.items.forEach(it=>set.add(it.id)); n.kids.forEach(k=>collectIds(k,set)); return set }
async function publish(){
  if(!TREE||BUSY)return;
  BUSY=true; toast("패키지 만드는 중\u2026");
  try{
    if(!window.JSZip) await new Promise((ok,no)=>{const s=document.createElement("script");
      s.src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js";
      s.onload=ok;s.onerror=no;document.head.appendChild(s)});
    const baked=bake(TREE);
    const keep=collectIds(baked,new Set());
    const zip=new JSZip(), as=zip.folder("assets");
    let n=0;
    for(const [id,m] of MEM){
      if(!keep.has(id)) continue;
      if(m.thumb) as.file(`t_${id}.jpg`,m.thumb);
      if(m.full){ const it=findItem(baked,id); if(it) as.file(`f_${id}.${it.fx||"jpg"}`,m.full) }
      n++;
    }
    zip.file("data.json",JSON.stringify({v:3,tree:baked,links:LINKS}));
    zip.file("index.html","<!doctype html>\n"+document.documentElement.outerHTML);
    const blob=await zip.generateAsync({type:"blob",compression:"STORE"},
      m=>{ if(m.percent%20<1) toast(`압축 ${Math.round(m.percent)}%`) });
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=`홍보팀_사이트_${new Date().toISOString().slice(0,10)}.zip`;
    a.click();
    toast(`완료 \u00b7 ${n}개 \u00b7 ${kb(blob.size)}`);
  }catch(e){ console.error(e); toast("패키지 생성 실패") }
  BUSY=false;
}
function findItem(n,id){
  const f=n.items.find(x=>x.id===id); if(f)return f;
  for(const k of n.kids){ const r=findItem(k,id); if(r)return r }
  return null;
}

document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){ closeLb(); closeM() }
  const lbOn=document.getElementById("lb").classList.contains("on");
  if(!lbOn){
    if(e.key==="Backspace"&&path.length&&!/^(INPUT|TEXTAREA)$/.test(e.target.tagName)){
      e.preventDefault(); path=path.slice(0,-1); route() }
    return;
  }
  if(vp.total){ if(e.key==="ArrowLeft")page(vp.n-1); if(e.key==="ArrowRight")page(vp.n+1) }
  else if(vp.sib){
    if(e.key==="ArrowLeft"&&vp.i>0) view(vp.sib[vp.i-1].id,vp.list);
    if(e.key==="ArrowRight"&&vp.i<vp.sib.length-1) view(vp.sib[vp.i+1].id,vp.list) }
});
(async()=>{
  try{
    const r=await fetch("./data.json",{cache:"no-store"});
    if(r.ok){ const d=await r.json();
      if(d.tree){ TREE=d.tree; RM=true; LINKS=d.links||{};
        EDITS={rename:{},hidden:[],hiddenItems:[],extra:{},order:{}} } }
  }catch{}
  topbar(); route();
})();
</script>
